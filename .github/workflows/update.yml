name: Live Data Update
on:
  schedule:
    - cron: '0 */4 * * *' # Aktualizacja co 4 godziny
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        run: pip install requests yfinance
      - name: Run Updater
        run: python updater.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      - name: Commit data
        run: |
          git config --global user.name 'Bot'
          git add data.json
          git commit -m "Update" || exit 0
          git push
