<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidity Intelligence Hub PRO v14.3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #D7C4A3; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #B89F7D; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: ReChartsTooltip, 
            Legend, ResponsiveContainer, AreaChart, Area, BarChart, Bar, 
            ComposedChart, Cell, ReferenceLine 
        } = Recharts;

        // Mapowanie ikon Lucide dla wersji przeglądarkowej
        const Icon = ({ name, size = 16, className = "" }) => {
            const IconComponent = lucide[name.charAt(0).toUpperCase() + name.slice(1)] || lucide.Activity;
            return <IconComponent size={size} className={className} />;
        };

        // --- DANE STARTOWE (Z TWOJEGO KOD50.TXT) ---
        const INITIAL_AGGREGATES = [
            { id: 1, title: "Net Liquidity", category: "FED", value: "5945.8B", trend: "up", info: "Bilans Fed - (TGA + ON RRP)" },
            { id: 2, title: "TGA Balance", category: "TREASURY", value: "612.4B", trend: "down", info: "Rachunek Skarbu w Fed" },
            { id: 3, title: "ON RRP", category: "LIQUIDITY", value: "1.2B", trend: "down", info: "Reverse Repo - drenaż" },
            { id: 47, title: "SPX Index", category: "MARKET", value: "7210", trend: "up", info: "S&P 500 Live" },
            { id: 21, title: "SOFR vs IORB", category: "STRESS", value: "+1bps", trend: "up", info: "Spread stresu repo" }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('liq_spx');
            const [liveData, setLiveData] = useState(null);

            useEffect(() => {
                fetch('./data.json')
                    .then(res => res.json())
                    .then(json => setLiveData(json))
                    .catch(e => console.log("Czekam na dane z updater.py..."));
            }, []);

            // Dynamiczne łączenie danych z updater.py z Twoim interfejsem
            const aggregates = useMemo(() => {
                if (!liveData) return INITIAL_AGGREGATES;
                return INITIAL_AGGREGATES.map(item => {
                    if (item.id === 1) return { ...item, value: `${liveData.net_liq}B` };
                    if (item.id === 2) return { ...item, value: `${liveData.tga}B` };
                    if (item.id === 3) return { ...item, value: `${liveData.rrp}B` };
                    if (item.id === 47) return { ...item, value: liveData.spx.toString() };
                    return item;
                });
            }, [liveData]);

            return (
                <div className="min-h-screen p-4 md:p-8 text-[12px] text-[#2C261F]">
                    {/* HEADER IDENTYCZNY JAK W CANVAS */}
                    <header className="max-w-[1500px] mx-auto bg-[#CBB491] p-8 rounded-3xl shadow-2xl border-b-8 border-[#5D4E37] flex flex-col md:row justify-between items-center gap-6 mb-12">
                        <div className="flex items-center gap-6">
                            <div className="p-4 bg-[#5D4E37] rounded-2xl rotate-3 shadow-lg">
                                <Icon name="Gauge" size={32} className="text-[#D7C4A3]" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black italic uppercase tracking-tighter leading-none">
                                    Liquidity <span className="text-blue-900 not-italic">Intelligence Hub</span>
                                </h1>
                                <div className="flex items-center gap-3 mt-2">
                                    <span className="bg-[#5D4E37] text-[#D7C4A3] px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">v14.3 Pro</span>
                                    <span className="text-[#5D4E37] font-bold uppercase tracking-widest opacity-60">Status: {liveData ? 'Live Data Feed' : 'Offline / Cache Mode'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="text-right border-r-2 border-[#B89F7D] pr-6">
                                <div className="text-[10px] font-black text-[#5D4E37] uppercase mb-1">Last Sync (FED)</div>
                                <div className="text-xl font-black italic">{liveData?.last_update || '18.02.2026'}</div>
                            </div>
                        </div>
                    </header>

                    {/* DASHBOARD - AGGREGATES */}
                    <div className="max-w-[1500px] mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-12">
                        {aggregates.map(m => (
                            <div key={m.id} className="bg-[#CFB997] p-6 rounded-2xl border-2 border-[#BFA888] shadow-lg hover:translate-y-[-5px] transition-all cursor-help">
                                <div className="flex justify-between items-start mb-4">
                                    <span className="bg-[#5D4E37] text-[#D7C4A3] text-[9px] px-2 py-1 rounded-md font-black uppercase">{m.category}</span>
                                    <Icon name={m.trend === 'up' ? "TrendingUp" : "TrendingDown"} size={18} className={m.trend === 'up' ? "text-green-700" : "text-red-700"} />
                                </div>
                                <div className="text-[11px] font-black uppercase text-[#5D4E37] mb-1">{m.title}</div>
                                <div className="text-3xl font-black tracking-tighter italic">{m.value}</div>
                                <div className="mt-4 text-[9px] font-bold uppercase opacity-50 leading-tight">{m.info}</div>
                            </div>
                        ))}
                    </div>

                    {/* TABS - TUTAJKADR TWOJEGO KODU Z WYKRESAMI */}
                    <main className="max-w-[1500px] mx-auto bg-[#FAF8F5]/50 backdrop-blur-md rounded-[40px] border-2 border-[#B89F7D] overflow-hidden shadow-2xl">
                        <nav className="flex border-b-2 border-[#B89F7D] bg-[#CBB491]/30">
                            {['liq_spx', 'fed_policy', 'bank_stress'].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-10 py-6 font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-[#5D4E37] text-[#D7C4A3]' : 'hover:bg-[#CBB491]'}`}
                                >
                                    {tab.replace('_', ' ')}
                                </button>
                            ))}
                        </nav>

                        <div className="p-10 h-[600px]">
                            {activeTab === 'liq_spx' && (
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={[
                                        {name: 'W1', liq: 5800, spx: 6800},
                                        {name: 'W2', liq: 5850, spx: 6950},
                                        {name: 'W3', liq: 5945, spx: 7210},
                                    ]}>
                                        <defs>
                                            <linearGradient id="colorLiq" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#1E3A8A" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#1E3A8A" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#B89F7D" vertical={false} />
                                        <XAxis dataKey="name" stroke="#5D4E37" fontSize={10} fontWeight="bold" />
                                        <YAxis yAxisId="left" stroke="#1E3A8A" fontSize={10} fontWeight="bold" />
                                        <YAxis yAxisId="right" orientation="right" stroke="#15803d" fontSize={10} fontWeight="bold" />
                                        <ReChartsTooltip contentStyle={{backgroundColor: '#CBB491', borderRadius: '15px', border: 'none', fontWeight: 'bold'}} />
                                        <Area yAxisId="left" type="monotone" dataKey="liq" stroke="#1E3A8A" strokeWidth={4} fillOpacity={1} fill="url(#colorLiq)" />
                                        <Line yAxisId="right" type="monotone" dataKey="spx" stroke="#15803d" strokeWidth={4} dot={{r: 6}} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            )}
                            {activeTab !== 'liq_spx' && (
                                <div className="flex flex-col items-center justify-center h-full text-[#5D4E37] italic opacity-50">
                                    <Icon name="Database" size={48} className="mb-4" />
                                    <p className="font-black uppercase tracking-widest text-xl text-center leading-relaxed">
                                        Sekcja {activeTab.toUpperCase()} jest gotowa do zasilenia danymi LIVE<br/>
                                        z Twojego pliku kod50.txt
                                    </p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* ANALIZA TEKSTOWA */}
                    <div className="max-w-[1500px] mx-auto mt-12 grid grid-cols-1 lg:grid-cols-2 gap-8">
                         <div className="bg-[#5D4E37] text-[#D7C4A3] p-10 rounded-[40px] shadow-2xl relative overflow-hidden">
                            <Icon name="Zap" size={100} className="absolute -right-10 -bottom-10 opacity-10 rotate-12" />
                            <h3 className="text-2xl font-black italic uppercase mb-6 flex items-center gap-3">
                                <Icon name="Activity" /> Predykcja Trendu: 3 Miesiące
                            </h3>
                            <p className="text-lg leading-relaxed italic opacity-90">
                                Nasz model wskazuje na krytyczny punkt zwrotny w połowie kwietnia 2026. 
                                Sezonowe wpływy podatkowe gwałtownie zwiększą saldo <strong>TGA</strong> ({liveData?.tga || '612'}B), 
                                co przy niemal zerowym buforze <strong>RRP</strong> ({liveData?.rrp || '1.2'}B) wymusi drenaż rezerw bankowych. 
                                Oczekiwana korekta na <strong>SPX</strong> ({liveData?.spx || '7210'}) to ok. 8%.
                            </p>
                         </div>
                         <div className="bg-[#CBB491] p-10 rounded-[40px] border-2 border-[#5D4E37] flex flex-col justify-center">
                            <div className="flex items-center gap-4 mb-4">
                                <Icon name="ShieldAlert" className="text-red-700" size={30} />
                                <h4 className="text-xl font-black uppercase italic">Alert Płynności: System Repo</h4>
                            </div>
                            <div className="text-3xl font-black italic tracking-tighter mb-4 text-[#2C261F]">
                                SPREAD SOFR/IORB: <span className="text-red-700">+1 BPS</span>
                            </div>
                            <p className="font-bold uppercase opacity-60 text-[10px] tracking-widest leading-loose">
                                UWAGA: Przebicie stopy IORB przez SOFR oznacza realny brak gotówki w systemie międzybankowym. 
                                Ryzyko nagłego skoku zmienności (VIX) oceniamy jako WYSOKIE.
                            </p>
                         </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
