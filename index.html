<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Liquidity Intelligence Hub LIVE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: #D7C4A3;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        // Prosty komponent ikony, bo Twój kod używa Lucide
        const Icon = ({ name, size = 20 }) => {
            const IconComponent = lucide[name.charAt(0).toUpperCase() + name.slice(1)] || lucide.Activity;
            return <IconComponent size={size} />;
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                // Pobieranie danych wygenerowanych przez Twojego bota
                fetch('./data.json')
                    .then(res => res.json())
                    .then(json => setData(json))
                    .catch(err => setError("Brak pliku danych. Uruchom 'Actions' w GitHubie."));
            }, []);

            if (error) return <div className="p-10 text-red-800 font-bold">{error}</div>;
            if (!data) return <div className="p-10 font-bold italic">Inicjalizacja terminala płynności...</div>;

            return (
                <div className="p-8 min-h-screen">
                    <header className="bg-[#CBB491] p-6 rounded-2xl shadow-xl flex justify-between items-center mb-8 border-b-4 border-[#5D4E37]">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase tracking-tighter">
                                Liquidity <span className="text-blue-900">Intelligence Hub</span>
                            </h1>
                            <p className="text-[10px] font-bold uppercase opacity-70">Status: Live Data Feed Active</p>
                        </div>
                        <div className="text-right">
                            <div className="text-sm font-black italic text-[#5D4E37]">Ostatnia aktualizacja:</div>
                            <div className="text-lg font-bold">{data.last_update}</div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-[#CFB997] p-6 rounded-xl border-2 border-[#BFA888] shadow-lg">
                            <div className="text-xs font-black uppercase text-[#5D4E37] flex items-center gap-2">
                                <Icon name="Droplets" /> Net Liquidity
                            </div>
                            <div className="text-4xl font-black mt-2 text-blue-900">${data.net_liq}B</div>
                        </div>
                        <div className="bg-[#CFB997] p-6 rounded-xl border-2 border-[#BFA888] shadow-lg">
                            <div className="text-xs font-black uppercase text-[#5D4E37] flex items-center gap-2">
                                <Icon name="Landmark" /> TGA Balance
                            </div>
                            <div className="text-4xl font-black mt-2">${data.tga}B</div>
                        </div>
                        <div className="bg-[#CFB997] p-6 rounded-xl border-2 border-[#BFA888] shadow-lg">
                            <div className="text-xs font-black uppercase text-[#5D4E37] flex items-center gap-2">
                                <Icon name="TrendingUp" /> S&P 500 Live
                            </div>
                            <div className="text-4xl font-black mt-2 text-green-800">{data.spx}</div>
                        </div>
                    </div>

                    <div className="bg-white/30 p-8 rounded-3xl border-2 border-[#B89F7D] italic">
                        <h3 className="font-black uppercase mb-2">Analiza Trendu Live:</h3>
                        <p>
                            Aktualna płynność netto wynosi <strong>${data.net_liq}B</strong>. 
                            Przy obecnym poziomie S&P 500 ({data.spx}) wskaźnik korelacji sugeruje stabilne otoczenie, 
                            jednak należy monitorować stan TGA ({data.tga}B), którego wzrost w kwietniu może wywołać drenaż rezerw.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
